<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Map — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <style>
    .study-map-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: var(--spacing-md, 1.5rem);
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-md, 1.5rem);
    }

    @media (max-width: 768px) {
      .study-map-layout {
        grid-template-columns: 1fr;
      }
      .toc-sidebar {
        position: static;
        max-height: none;
      }
    }

    /* Sidebar table of contents */
    .toc-sidebar {
      position: sticky;
      top: var(--spacing-md, 1.5rem);
      align-self: start;
      max-height: calc(100vh - 3rem);
      overflow-y: auto;
      padding: var(--spacing-sm, 0.75rem);
      background: var(--color-surface, #f8f9fa);
      border: 1px solid var(--color-border, #e0e0e0);
      border-radius: var(--radius-md, 8px);
    }

    .toc-sidebar h2 {
      font-size: var(--font-size-sm, 0.9rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted, #555);
      margin: 0 0 var(--spacing-xs, 0.5rem);
    }

    .toc-sidebar ol {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc-sidebar li {
      margin-bottom: 0.25rem;
    }

    .toc-sidebar a {
      display: block;
      padding: 0.3rem 0.5rem;
      font-size: var(--font-size-sm, 0.85rem);
      color: var(--color-link, #2563eb);
      text-decoration: none;
      border-radius: var(--radius-sm, 4px);
    }

    .toc-sidebar a:hover,
    .toc-sidebar a:focus-visible {
      background: var(--color-hover, #e8ecf1);
    }

    .toc-sidebar .toc-subtopic {
      padding-left: 1rem;
    }

    /* Main content area */
    .study-map-content section {
      margin-bottom: var(--spacing-md, 1.5rem);
    }

    .study-map-content details {
      border: 1px solid var(--color-border, #e0e0e0);
      border-radius: var(--radius-md, 8px);
      margin-bottom: var(--spacing-sm, 0.75rem);
      background: var(--color-card-bg, #fff);
    }

    .study-map-content details[open] > summary {
      border-bottom: 1px solid var(--color-border, #e0e0e0);
    }

    .study-map-content summary {
      padding: var(--spacing-sm, 0.75rem) var(--spacing-md, 1rem);
      font-weight: 600;
      cursor: pointer;
      color: var(--color-heading, #1a1a2e);
      list-style: none;
    }

    .study-map-content summary::before {
      content: "▶ ";
      font-size: 0.75em;
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .study-map-content details[open] > summary::before {
      transform: rotate(90deg);
    }

    .study-map-content summary::-webkit-details-marker {
      display: none;
    }

    .topic-body {
      padding: var(--spacing-sm, 0.75rem) var(--spacing-md, 1rem);
    }

    /* Nested subtopics */
    .subtopic {
      margin-left: var(--spacing-sm, 0.75rem);
      border-left: 2px solid var(--color-accent, #2563eb);
      padding-left: var(--spacing-sm, 0.75rem);
      margin-top: var(--spacing-xs, 0.5rem);
    }

    /* Relationship indicators */
    .related-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: var(--spacing-xs, 0.5rem);
      padding-top: var(--spacing-xs, 0.5rem);
      border-top: 1px dashed var(--color-border, #e0e0e0);
    }

    .related-tag {
      font-size: var(--font-size-xs, 0.75rem);
      padding: 0.15rem 0.5rem;
      background: var(--color-tag-bg, #e0ecff);
      color: var(--color-tag-text, #1e40af);
      border-radius: var(--radius-sm, 4px);
      text-decoration: none;
    }

    .related-tag:hover,
    .related-tag:focus-visible {
      background: var(--color-tag-hover, #c7d9f7);
    }
  </style>
</head>
<body>
  <header role="banner">
    <h1>Study Map</h1>
  </header>

  <div class="study-map-layout">
    <aside class="toc-sidebar" aria-label="Table of contents">
      <h2>Contents</h2>
      {{TOC_CONTENT}}
    </aside>

    <main class="study-map-content" role="main">
      {{STUDY_MAP_CONTENT}}
    </main>
  </div>

  <script src="{{NAV_JS}}" defer></script>
  <script>
    // Expand all details elements by default
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.study-map-content details').forEach(function (el) {
        el.setAttribute('open', '');
      });
    });
  </script>
</body>
</html>
