<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{EXAM_TITLE}} — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <link rel="stylesheet" href="{{EXAM_FORMAT_CSS}}">
  <style>
    .exam-page {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--spacing-md, 1.5rem);
    }

    .exam-header {
      margin-bottom: var(--spacing-lg, 2rem);
      padding-bottom: var(--spacing-sm, 0.75rem);
      border-bottom: 2px solid var(--color-accent, #2563eb);
    }

    .exam-header h1 {
      color: var(--color-heading, #1a1a2e);
      margin-bottom: var(--spacing-xs, 0.5rem);
    }

    .exam-header p {
      color: var(--color-text-muted, #555);
      line-height: 1.5;
    }

    .exam-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--color-text-muted, #555);
    }

    .exam-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border, #e0e0e0);
      border-top-color: var(--color-accent, #2563eb);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: var(--spacing-sm, 0.75rem);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .exam-actions {
      margin-top: var(--spacing-lg, 2rem);
      padding-top: var(--spacing-md, 1rem);
      border-top: 1px solid var(--color-border, #e0e0e0);
      text-align: center;
    }

    .btn-show-answers {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-size: var(--font-size-md, 1rem);
      font-weight: 600;
      color: var(--color-btn-text, #fff);
      background: var(--color-accent, #2563eb);
      border: none;
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-show-answers:hover,
    .btn-show-answers:focus-visible {
      background: var(--color-accent-hover, #1d4ed8);
    }
  </style>
</head>
<body>
  <div class="exam-page">
    <header class="exam-header" role="banner">
      <h1>{{EXAM_TITLE}}</h1>
      <p>{{EXAM_DESCRIPTION}}</p>
    </header>

    <main role="main">
      <div
        id="exam-container"
        data-exam="{{EXAM_DATA_PATH}}"
        aria-label="Practice exam"
        role="application"
      >
        <div class="exam-loading" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading exam&hellip;</p>
        </div>
      </div>

      <div class="exam-actions">
        <button
          type="button"
          class="btn-show-answers"
          id="show-answers-btn"
          aria-label="Reveal all correct answers"
        >
          Show Correct Answers
        </button>
      </div>
    </main>
  </div>

  <script src="{{NAV_JS}}" defer></script>
  <script src="{{EXAM_FORMAT_JS}}" defer></script>
</body>
</html>
