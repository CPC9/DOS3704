<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last-Minute Review — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <style>
    .review-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--spacing-md, 1.5rem);
    }

    .review-page header {
      margin-bottom: var(--spacing-md, 1.5rem);
    }

    .review-page h1 {
      color: var(--color-heading, #1a1a2e);
      margin-bottom: var(--spacing-xs, 0.5rem);
    }

    .review-page > .subtitle {
      color: var(--color-text-muted, #555);
      font-size: var(--font-size-md, 1rem);
    }

    /* Two-column layout on desktop */
    .review-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md, 1.5rem);
    }

    @media (max-width: 768px) {
      .review-columns {
        grid-template-columns: 1fr;
      }
    }

    /* Content blocks */
    .review-section {
      margin-bottom: var(--spacing-md, 1.5rem);
      break-inside: avoid;
    }

    .review-section h2 {
      font-size: var(--font-size-lg, 1.2rem);
      color: var(--color-heading, #1a1a2e);
      border-bottom: 2px solid var(--color-accent, #2563eb);
      padding-bottom: var(--spacing-xs, 0.25rem);
      margin-bottom: var(--spacing-sm, 0.5rem);
    }

    .review-section ul {
      padding-left: 1.25rem;
      margin: 0;
    }

    .review-section li {
      margin-bottom: 0.35rem;
      line-height: 1.5;
    }

    /* Formula reference cards */
    .formula-card {
      background: var(--color-surface, #f8f9fa);
      border: 1px solid var(--color-border, #e0e0e0);
      border-radius: var(--radius-md, 8px);
      padding: var(--spacing-sm, 0.75rem);
      margin-bottom: var(--spacing-sm, 0.75rem);
      font-family: var(--font-mono, monospace);
      font-size: var(--font-size-sm, 0.9rem);
    }

    /* Critical terms */
    .critical-term {
      background: var(--color-highlight, #fff3cd);
      padding: 0.1rem 0.35rem;
      border-radius: var(--radius-sm, 3px);
      font-weight: 600;
    }

    /* Print styles */
    @media print {
      body {
        font-size: 10pt;
        color: #000;
        background: #fff;
      }

      .review-page {
        padding: 0;
        max-width: none;
      }

      .review-columns {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .review-section h2 {
        border-bottom-color: #000;
      }

      .formula-card {
        border-color: #999;
        background: #f5f5f5;
      }

      .critical-term {
        background: none;
        text-decoration: underline;
        font-weight: bold;
      }

      nav, footer, .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="review-page">
    <header role="banner">
      <h1>Last-Minute Review</h1>
      <p class="subtitle">Quick-scan reference — everything on one page</p>
    </header>

    <main role="main">
      <div class="review-columns">
        {{REVIEW_CONTENT}}
      </div>
    </main>

    <footer class="no-print">
      <p>Tip: Use <kbd>Ctrl+P</kbd> / <kbd>Cmd+P</kbd> to print this page as a study sheet.</p>
    </footer>
  </div>

  <script src="{{NAV_JS}}" defer></script>
</body>
</html>
